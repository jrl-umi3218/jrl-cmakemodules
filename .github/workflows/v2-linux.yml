name: V2 - Linux

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu22:
    name: Ubuntu 22.04
    runs-on: ubuntu-latest
    container:
      image: docker://ubuntu:22.04

    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies (via apt)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends  \
            git \
            cmake \
            ninja-build \
            g++ \
            wget \
            unzip \
            python3 \
            python3-pip \
            python3-venv \
            libboost-python-dev \
            libeigen3-dev \
            libmatio-dev \
            libsimde-dev \
            libsuitesparse-dev

      - name: Setup Python Virtual Environment
        run: |
          python3 -m venv /opt/venv
          echo "/opt/venv/bin" >> $GITHUB_PATH

      - name: Install python dependencies (via pip)
        run: |
          pip install --upgrade pip
          pip install nanobind pytest numpy

      - name: Build Catch2 (Ubuntu 22.04 has Catch2 v2, we need v3)
        run: |
          cd /tmp
          wget https://github.com/catchorg/Catch2/archive/refs/tags/v3.11.0.zip -O catch2.zip
          unzip catch2.zip
          cmake -B catch2-build -S Catch2-3.11.0 -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build catch2-build --config Release
          cmake --install catch2-build

      - name: Configure project
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DJRL_CMAKEMODULES_BUILD_TESTS=ON

      - name: Build project
        run: cmake --build build

      - name: Install project
        run: cmake --install build --prefix ./install

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  ubuntu24:
    name: Ubuntu 24.04
    runs-on: ubuntu-latest
    container:
      image: docker://ubuntu:24.04

    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies (via apt)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git \
            g++ \
            cmake \
            ninja-build \
            catch2 \
            python3 \
            python3-pip \
            python3-venv \
            libboost-python-dev \
            libeigen3-dev \
            libmatio-dev \
            libsimde-dev \
            libsuitesparse-dev

      - name: Setup Python Virtual Environment
        run: |
          python3 -m venv /opt/venv
          echo "/opt/venv/bin" >> $GITHUB_PATH

      - name: Install python dependencies (via pip)
        run: |
          pip install --upgrade pip
          pip install nanobind pytest numpy

      - name: Configure project
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DJRL_CMAKEMODULES_BUILD_TESTS=ON

      - name: Build project
        run: cmake --build build

      - name: Install project
        run: cmake --install build --prefix ./install

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  api_doc:
    name: "Generate API documentation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate API documentation (direct function call)
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DJRL_CMAKEMODULES_GENERATE_API_DOC=ON

      - name: Check API is still up to date
        run: git diff --exit-code -- v2/docs

      - name: Generate API documentation (cmake script mode)
        run: cmake -DJRL_GENERATE_API_DOC=ON -P v2/modules/jrl.cmake

  archlinux:
    name: "Archlinux"
    runs-on: ubuntu-latest
    container:
      image: docker://archlinux:latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            cmake \
            ninja \
            gcc \
            catch2 \
            python-pytest \
            nanobind \
            python-numpy \
            boost \
            boost-libs \
            eigen \
            libmatio \
            simde \
            suitesparse

      - name: Configure project
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DJRL_CMAKEMODULES_BUILD_TESTS=ON

      - name: Build project
        run: cmake --build build

      - name: Install project
        run: cmake --install build --prefix ./install

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
