name: V2 - Python scripts

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    name: Test Python Scripts (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: v2/scripts
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0

      - name: Run unit tests
        run: uv run --extra test --python ${{ matrix.python-version }} pytest

      - name: Verify CLI command works
        run: uv run --python ${{ matrix.python-version }} jrl-release --help

      - name: Verify version consistency
        run: uv run --python ${{ matrix.python-version }} jrl-release --check-version
