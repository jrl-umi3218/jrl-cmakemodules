[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64", "win-64"]
preview = ["pixi-build"]

[dependencies]
cxx-compiler = "*"
cmake = ">=3.22"
ninja = "*"
python = ">=3.10"

[tasks]
clear = { cmd = "rm -rf build" }
configure = { cmd = "cmake --log-level=DEBUG -G Ninja -S . -B build" }
test = { depends-on = ["clear", "configure"] }
