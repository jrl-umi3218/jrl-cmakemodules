[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64", "win-64"]

[tasks]
test_find_accelerate = { cmd = "pixi run test", cwd = "FindAccelerate" }
test_find_accelerate_notfound = { cmd = "pixi run test", cwd = "FindAccelerateNotFound" }
test_find_matio = { cmd = "pixi run test", cwd = "Findmatio" }
test_find_matio_notfound = { cmd = "pixi run test", cwd = "FindmatioNotFound" }
test_find_simde = { cmd = "pixi run test", cwd = "Findsimde" }
test_find_simde_notfound = { cmd = "pixi run test", cwd = "FindsimdeNotFound" }
test_find_pytest = { cmd = "pixi run test", cwd = "FindPytest" }
test_find_pytest_notfound = { cmd = "pixi run test", cwd = "FindPytestNotFound" }
test_find_cholmod = { cmd = "pixi run test", cwd = "FindCHOLMOD" }
test_find_cholmod_notfound = { cmd = "pixi run test", cwd = "FindCHOLMODNotFound" }

test = { depends-on = [
    "test_find_accelerate",
    "test_find_accelerate_notfound",
    "test_find_matio",
    "test_find_matio_notfound",
    "test_find_simde",
    "test_find_simde_notfound",
    "test_find_pytest",
    "test_find_pytest_notfound",
    "test_find_cholmod",
    "test_find_cholmod_notfound",
] }
