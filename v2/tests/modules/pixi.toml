[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
cmake = ">=3.22"

[tasks]
clear ={ cmd = "rm -rf build" }
configure = { cmd = "cmake -S . -B build" }
build = { cmd = "cmake --build build" }
ctest = { cmd = "ctest --test-dir build --output-on-failure" }
test = { depends-on = ["clear", "configure", "build", "ctest"] }
