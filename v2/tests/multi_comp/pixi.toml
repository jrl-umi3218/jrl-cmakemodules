[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64", "win-64"]

[tasks]
test_library = { cmd = "pixi run test", cwd = "mc-library" }
test_consumer = { cmd = "pixi run test", cwd = "mc-consumer" }
test_consumer_all = { cmd = "pixi run test", cwd = "mc-consumer-all" }
test = { depends-on = ["test_library", "test_consumer", "test_consumer_all"] }
