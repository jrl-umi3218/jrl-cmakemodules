[workspace]
name = "find-package-v1"
version = "1.0.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64", "win-64"]
preview = ["pixi-build"]

[dependencies]
cxx-compiler = "*"
cmake = ">=3.22"
ninja = "*"
jrl-cmakemodules = { path = "../../../../" }

[tasks]
clear = { cmd = "rm -rf build" }
configure = { cmd = "cmake --log-level=DEBUG -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build/install" }
build = { cmd = "cmake --build build" }
install = { cmd = "cmake --install build" }
test = { depends-on = ["clear", "configure", "build", "install"] }

[package]
name = { workspace = true }
version = { workspace = true }

[package.host-dependencies]
jrl-cmakemodules = { path = "../../../../" }

[package.build]
backend = { name = "pixi-build-cmake", version = "*" }
