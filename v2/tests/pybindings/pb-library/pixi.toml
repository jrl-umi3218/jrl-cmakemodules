[workspace]
name = "pb-library"
version = "1.0.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64", "win-64"]
preview = ["pixi-build"]

[dependencies]
cxx-compiler = ">=1.10.0,<2"
cmake = ">=3.22"
ninja = "*"
jrl-cmakemodules = { path = "../../../.." }
python = ">=3.10"
nanobind = ">=2.5.0"
libboost-python-devel = ">=1.82.0,<2"
catch2 = ">=3"
pytest = ">=9.0.0,<10"

[tasks]
clear = { cmd = "rm -rf build" }
configure = { cmd = "cmake --log-level=DEBUG -G Ninja -S . -B build" }
build = { cmd = "cmake --build build --verbose" }
install = { cmd = "cmake --install build" }
test = { depends-on = ["clear", "configure", "build", "install"] }

[package]
name = { workspace = true }
version = { workspace = true }

[package.host-dependencies]
jrl-cmakemodules = { path = "../../../.." }
python = ">=3.10"
nanobind = ">=2.5.0"
libboost-python-devel = ">=1.82.0,<2"
catch2 = ">=3.1.0,<4"
pytest = ">=9.0.0,<10"

[package.build]
backend = { name = "pixi-build-cmake", version = "*" }
