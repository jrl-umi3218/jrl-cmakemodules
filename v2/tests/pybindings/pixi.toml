[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64", "win-64"]
preview = ["pixi-build"]

[dependencies]
pb-consumer = { path = "pb-consumer" }
pb-library = { path = "pb-library" }
