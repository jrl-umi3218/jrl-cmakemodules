[workspace]
name = "pb-library"
version = "1.0.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64", "win-64"]
preview = ["pixi-build"]

[dependencies]
cxx-compiler = "*"
cmake = ">=3.22"
ninja = "*"
jrl-cmakemodules = { path = "../../../.." }
python = ">=3.10"
nanobind = ">=2.5.0"
libboost-python-devel = ">=1.82.0,<2"
catch2 = ">=3"
pytest = "*"

[tasks]
clear = { cmd = "rm -rf build" }
configure = { cmd = "cmake --log-level=DEBUG -G Ninja -S . -B build -DPB_BUILD_PYTHON_BINDINGS=ON -DPB_BUILD_TESTS=ON" }
build = { cmd = "cmake --build build --verbose" }
install = { cmd = "cmake --install build" }
ctest = { cmd = "ctest --test-dir build --output-on-failure --no-tests=ignore" }
test = { depends-on = ["clear", "configure", "build", "install", "ctest"] }

[package]
name = { workspace = true }
version = { workspace = true }

[package.host-dependencies]
jrl-cmakemodules = { path = "../../../.." }
python = ">=3.10"
nanobind = ">=2.5.0"
libboost-python-devel = ">=1.82.0,<2"
catch2 = ">=3"
pytest = "*"

[package.build]
backend = { name = "pixi-build-cmake", version = "*" }
